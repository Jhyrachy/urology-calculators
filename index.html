<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Evidence-based clinical calculators for urology practice. Mobile-first PWA.">
  <meta name="theme-color" content="#1a5276">
  <title>Urology Calculators</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧮</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🧮 Urology Calculators</h1>
    <p class="subtitle">Evidence-based clinical tools — EAU 2026</p>
  </header>

  <nav id="tab-nav" role="tablist" aria-label="Application sections">
    <button id="tab-btn-calc" class="tab-btn" role="tab" aria-selected="true" aria-controls="panel-calc">
      <span class="tab-icon">🧮</span> Calcolatori
    </button>
    <button id="tab-btn-fc" class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-fc">
      <span class="tab-icon">📊</span> Flowchart
    </button>
  </nav>

  <div id="search-bar">
    <input type="search" id="search" placeholder="Search..." aria-label="Search">
  </div>

  <div id="panel-calc" role="tabpanel" aria-labelledby="tab-btn-calc">
    <main id="app">
      <!-- Calculator cards injected here by app.js -->
    </main>
  </div>

  <div id="panel-fc" role="tabpanel" aria-labelledby="tab-btn-fc" class="hidden">
    <main id="flowcharts-view">
      <!-- Flowchart cards injected here by app.js -->
    </main>
  </div>

  <footer>
    <p>⚠️ For educational use only. Always verify with clinical judgment.</p>
    <p>Sources: <a href="https://uroweb.org/guidelines" target="_blank" rel="noopener">EAU Guidelines</a></p>
  </footer>

  <!-- Calculator detail view (hidden by default) -->
  <div id="calc-detail" class="hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
